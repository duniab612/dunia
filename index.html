<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>成绩查询系统</title>
<style>
*{box-sizing:border-box}
body{margin:20px;font-family:Arial;background:#f7f8fa}
.container{max-width:700px;margin:0 auto;background:#fff;padding:24px;border-radius:12px;box-shadow:0 2px 10px #00000008}
h2{margin-top:4px;color:#333}
.search-box{position:relative}
#search{width:100%;padding:12px 16px;border:1px solid #ddd;border-radius:8px;font-size:15px;outline:none;margin:10px 0 16px}
#search:focus{border-color:#2d8cf0}
.item{padding:14px 16px;border-bottom:1px solid #f0f0f0;border-radius:8px;margin-bottom:8px}
.item.highlight{background:#e6f7ff}
.name{font-weight:bold;font-size:16px;color:#222}
.label{display:inline-block;background:#f5f5f5;padding:2px 8px;border-radius:4px;font-size:12px;margin-right:6px;color:#666}
</style>
</head>
<body>
<div class="container">
  <h2>赛事成绩查询</h2>
  <div class="search-box">
    <input type="text" id="search" placeholder="输入姓名查询成绩" oninput="doSearch()">
  </div>
  <div id="list"></div>
</div>

<script>
let allData = [];

// 👉 这里我已经修复成正确文件名 + 强制不缓存
fetch('./competition_data.json?v=' + Math.random())
  .then(r => r.json())
  .then(data => {
    allData = data;
    renderList(data);
  })
  .catch(e => {
    document.getElementById('list').innerHTML = '<div style="padding:16px">暂无成绩数据</div>';
  });

function renderList(data) {
  let html = '';
  if (data && data.length) {
    data.forEach(item => {
      const realName = (item.姓名 || '').trim();
      const showName = realName.length >= 2 ? realName[0] + '*' + realName.slice(1) : realName;
      html += `
      <div class="item">
        <div class="name">${showName}</div>
        <div style="margin-top:6px">
          <span class="label">${item.组别 || '未知组别'}</span>
          <span class="label">${item.用时 || ''}</span>
        </div>
      </div>`;
    });
  }
  document.getElementById('list').innerHTML = html || '<div style="padding:16px">暂无成绩数据</div>';
}

function doSearch() {
  const kw = document.getElementById('search').value.trim();
  const filtered = (allData || []).filter(item => {
    return (item.姓名 || '').includes(kw);
  });
  renderList(filtered);
}
</script>
</body>
</html>
